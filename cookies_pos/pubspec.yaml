name: cookies_pos
description: "BiteTimes - Point of Sale Application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  image_cropper: ^12.1.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.1
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/src/logo.png"
  adaptive_icon_background: "#0047AB"
  adaptive_icon_foreground: "lib/src/logo.png"

flutter:
  uses-material-design: true
  assets:
    - lib/src/logo.png
